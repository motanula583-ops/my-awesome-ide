<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ultimate IDE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    
    <style>
        body { margin: 0; background-color: #282a36; color: white; font-family: sans-serif; }
        header { padding: 20px; text-align: center; background-color: #1e1f29; border-bottom: 2px solid #bd93f9; }
        
        .controls { text-align: center; margin-top: 20px; }
        select { padding: 10px; font-size: 16px; background-color: #44475a; color: white; border: 1px solid #6272a4; border-radius: 5px; outline: none; cursor: pointer; max-width: 300px;}
        
        .editor-container { width: 80%; margin: 20px auto; border: 2px solid #6272a4; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(189, 147, 249, 0.2); }
        .CodeMirror { height: 400px; font-size: 16px; }
        
        button { display: block; margin: 20px auto; padding: 15px 30px; font-size: 18px; background-color: #50fa7b; color: #282a36; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #40c563; transform: scale(1.05); }

        .output-container { width: 80%; margin: 20px auto; padding: 20px; background-color: #1e1f29; border: 2px solid #ff79c6; border-radius: 8px; font-family: monospace; font-size: 16px; min-height: 150px; white-space: pre-wrap; box-sizing: border-box; overflow-y: auto; max-height: 400px;}
        .output-title { margin-top: 0; color: #ff79c6; }
        .loading-text { color: #f1fa8c; }
    </style>
</head>
<body>
    <header>
        <h1>My Ultimate Code Editor</h1>
    </header>

    <div class="controls">
        <label for="language-select">Choose Language: </label>
        <select id="language-select">
            <option value="">Loading languages...</option>
        </select>
    </div>

    <div class="editor-container">
        <textarea id="code-editor"></textarea>
    </div>

    <button id="run-btn">Run Code</button>

    <div class="output-container">
        <h3 class="output-title">Console Output:</h3>
        <div id="output">Output will appear here...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/go/go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/rust/rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/ruby/ruby.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/php/php.min.js"></script>

    <script>
        // --- PUT YOUR RAPIDAPI KEY HERE ---
        const RAPIDAPI_KEY = "c5bf441126mshe88e0dcc0860355p14c08bjsn821201c86d88"; 
        // ----------------------------------

        // 1. Initialize the Editor
        var editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            mode: "python", 
            theme: "dracula",
            lineNumbers: true
        });

        // Dictionary to map Judge0 language names to CodeMirror syntax highlighting
        const syntaxMapping = {
            "python": "python",
            "javascript": "javascript",
            "c ": "text/x-csrc",
            "c++": "text/x-c++src",
            "java ": "text/x-java",
            "c#": "text/x-csharp",
            "go ": "go",
            "rust ": "rust",
            "ruby ": "ruby",
            "php ": "php"
        };

        // 2. Fetch all languages dynamically from Judge0
        async function fetchLanguages() {
            try {
                const response = await fetch("https://judge0-ce.p.rapidapi.com/languages", {
                    method: "GET",
                    headers: {
                        "X-RapidAPI-Key": RAPIDAPI_KEY,
                        "X-RapidAPI-Host": "judge0-ce.p.rapidapi.com"
                    }
                });
                
                const runtimes = await response.json();
                const selectElement = document.getElementById("language-select");
                selectElement.innerHTML = ""; 

                // Populate the dropdown (Judge0 returns {id: 71, name: "Python (3.8.1)"})
                runtimes.forEach(runtime => {
                    const option = document.createElement("option");
                    option.value = runtime.id; // Judge0 uses numerical IDs
                    option.setAttribute("data-name", runtime.name.toLowerCase()); 
                    option.textContent = runtime.name;
                    selectElement.appendChild(option);
                });

                // Default to Python (Judge0 ID 71)
                selectElement.value = "71";
                editor.setValue("print('Hello from the Bulletproof IDE!')\n");

            } catch (error) {
                document.getElementById("language-select").innerHTML = '<option>Error loading languages (Check API Key)</option>';
            }
        }

        // 3. Listen for Dropdown Changes
        document.getElementById("language-select").addEventListener("change", function(event) {
            const selectElement = event.target;
            const langName = selectElement.options[selectElement.selectedIndex].getAttribute("data-name");
            
            // Find the right syntax coloring based on the name
            let mode = null;
            for (const key in syntaxMapping) {
                if (langName.includes(key)) {
                    mode = syntaxMapping[key];
                    break;
                }
            }
            
            editor.setOption("mode", mode);
            editor.setValue(`// Write your code here...\n`);
            document.getElementById("output").innerText = "Output will appear here...";
            document.getElementById("output").style.color = "white";
        });

        // 4. Execute Code via Judge0
        document.getElementById("run-btn").addEventListener("click", async function() {
            const runBtn = document.getElementById("run-btn");
            const outputDiv = document.getElementById("output");
            const selectedLanguageId = document.getElementById("language-select").value;
            const code = editor.getValue();

            runBtn.innerText = "Running...";
            outputDiv.innerHTML = '<span class="loading-text">Authenticating and executing...</span>';
            outputDiv.style.color = "white";

            try {
                // The ?wait=true tells Judge0 to hold the connection until the code is finished running
                const response = await fetch("https://judge0-ce.p.rapidapi.com/submissions?base64_encoded=false&wait=true", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "X-RapidAPI-Key": RAPIDAPI_KEY,
                        "X-RapidAPI-Host": "judge0-ce.p.rapidapi.com"
                    },
                    body: JSON.stringify({
                        language_id: parseInt(selectedLanguageId),
                        source_code: code
                    })
                });

                const result = await response.json();
                
                // Judge0 separates output into stdout, stderr, and compile_output
                let finalOutput = "";
                
                if (result.stdout) finalOutput += result.stdout + "\n";
                if (result.stderr) finalOutput += "Error:\n" + result.stderr + "\n";
                if (result.compile_output) finalOutput += "Compiler Info:\n" + result.compile_output + "\n";
                
                // If everything is null but it ran, it might just be silent
                if (!result.stdout && !result.stderr && !result.compile_output && result.status) {
                    finalOutput = `Status: ${result.status.description} (No output printed)`;
                }

                outputDiv.innerText = finalOutput || "An unknown error occurred.";
                
                // Turn red if there was an error
                if (result.stderr || result.compile_output || (result.status && result.status.id > 3)) {
                    outputDiv.style.color = "#ff5555"; 
                }

            } catch (error) {
                outputDiv.innerText = "Execution Error. Please check if your API Key is correct inside the HTML file.";
                outputDiv.style.color = "#ff5555";
            }

            runBtn.innerText = "Run Code";
        });

        // Start!
        fetchLanguages();
    </script>
</body>
</html>
